<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漿料換算極片數量計算機</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --preset-bg: #d4edda; /* 綠底 */
            --loss-bg: #e2e3e5;   /* 灰底 */
        }
        body {
            font-family: 'Calibri', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 850px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .section-title {
            font-weight: bold;
            margin: 20px 0 10px 0;
            padding: 5px 10px;
            border-radius: 4px;
            display: inline-block;
        }
        .bg-preset { background-color: var(--preset-bg); color: #155724; }
        .bg-loss { background-color: var(--loss-bg); color: #383d41; }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .grid-preset { background-color: rgba(212, 237, 218, 0.3); border: 1px solid var(--preset-bg); }
        .grid-loss { background-color: rgba(226, 227, 229, 0.3); border: 1px solid var(--loss-bg); }

        .input-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.85em;
        }
        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: 'Calibri', 'Microsoft JhengHei', sans-serif;
        }
        .result-section {
            padding: 25px;
            background: #eef2f3;
            border-radius: 8px;
            border-left: 6px solid var(--accent-color);
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .result-value { font-weight: bold; color: #d35400; }
        .footer-info {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 0.9em;
            color: #555;
        }
        .footer-item { display: block; }
        @media (max-width: 600px) { .grid-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <h1>漿料換算極片數量計算機 (R8)</h1>
    
    <div class="section-title bg-preset">預制設定</div>
    <div class="grid-container grid-preset">
        <div class="input-group">
            <label>投入桶數</label>
            <input type="number" id="bucketCount" value="2" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>單桶漿料重量 (kg)</label>
            <input type="number" id="weightPerBucket" value="11" step="0.1" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>固含量 (%)</label>
            <input type="number" id="solidContent" value="57.10" step="0.01" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>面密度 (mg/cm²)</label>
            <input type="number" id="arealDensity" value="12.70" step="0.01" oninput="calculate()">
        </div>
    </div>

    <div class="section-title bg-loss">固定損耗設定</div>
    <div class="grid-container grid-loss">
        <div class="input-group">
            <label>過濾器/管路料損 (kg)</label>
            <input type="number" id="filterLoss" value="1.8" step="0.1" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>塗佈損耗 (m)</label>
            <input type="number" id="coatLossM" value="5" step="0.5" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>輾壓損耗 (m)</label>
            <input type="number" id="rollLossM" value="3" step="0.5" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>製片損耗 (m)</label>
            <input type="number" id="sliceLossM" value="3" step="0.5" oninput="calculate()">
        </div>
    </div>

    <div class="input-group" style="padding: 0 15px;">
        <label>塗佈幅寬: 255mm | 極片高度: 124mm | 模數: 2</label>
    </div>

    <div class="result-section">
        <div class="result-item">
            <span>有效漿料量：</span>
            <span class="result-value" id="effectiveSlurryOut">-</span>
        </div>
        <div class="result-item">
            <span>理論總長度：</span>
            <span class="result-value" id="theoryLengthOut">-</span>
        </div>
        <div class="result-item">
            <span>扣除損耗後可用長度：</span>
            <span class="result-value" style="color: #27ae60;" id="finalLengthOut">-</span>
        </div>
        <div class="result-item" style="border-top: 1px solid #ccc; padding-top: 10px; margin-top: 10px;">
            <span>最終可產出極片數量：</span>
            <span class="result-value" style="font-size: 1.5em;" id="totalPiecesOut">-</span>
        </div>
    </div>

    <div class="footer-info">
        <span class="footer-item">拜訪次數：20 次</span>
        <span class="footer-item">作者：SJ</span>
        <span class="footer-item">版本：v1.5.1</span>
        <span class="footer-item">最後更新日期：2026-03-16</span>
    </div>
</div>

<script>
function calculate() {
    // 讀取數值
    const bCount = parseFloat(document.getElementById('bucketCount').value) || 0;
    const wPerB = parseFloat(document.getElementById('weightPerBucket').value) || 0;
    const sc = parseFloat(document.getElementById('solidContent').value) || 0;
    const ad = parseFloat(document.getElementById('arealDensity').value) || 0;
    
    const fLoss = parseFloat(document.getElementById('filterLoss').value) || 0;
    const coatL = parseFloat(document.getElementById('coatLossM').value) || 0;
    const rollL = parseFloat(document.getElementById('rollLossM').value) || 0;
    const sliceL = parseFloat(document.getElementById('sliceLossM').value) || 0;

    // 固定規格
    const cw = 255; 
    const ph = 124;
    const up = 2;

    // 1. 計算有效漿料
    let effectiveSlurryKg = (bCount * wPerB) - fLoss;
    if (effectiveSlurryKg < 0) effectiveSlurryKg = 0;

    // 2. 計算理論長度
    let dryWeightG = (effectiveSlurryKg * 1000) * (sc / 100);
    let areaCm2 = dryWeightG / (ad / 1000);
    let theoryLengthM = (areaCm2 / ((cw / 10) * 2)) / 100;

    // 3. 扣除固定長度損耗
    let finalLengthM = theoryLengthM - coatL - rollL - sliceL;
    if (finalLengthM < 0) finalLengthM = 0;

    // 4. 計算片數
    let totalPieces = Math.floor((finalLengthM * 1000) / ph) * up;

    // 顯示結果
    document.getElementById('effectiveSlurryOut').innerText = effectiveSlurryKg.toFixed(2) + " kg";
    document.getElementById('theoryLengthOut').innerText = theoryLengthM.toFixed(2) + " m";
    document.getElementById('finalLengthOut').innerText = finalLengthM.toFixed(2) + " m";
    document.getElementById('totalPiecesOut').innerText = totalPieces.toLocaleString() + " 片";
}
window.onload = calculate;
</script>

</body>
</html>
