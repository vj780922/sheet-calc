<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漿料換算極片數量計算機</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --error-color: #e74c3c;
        }
        body {
            font-family: 'Calibri', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.9em;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1em;
            font-family: 'Calibri', 'Microsoft JhengHei', sans-serif;
        }
        input.highlight {
            border-color: var(--error-color);
            background-color: #fff5f5;
        }
        .result-section {
            margin-top: 30px;
            padding: 25px;
            background: #eef2f3;
            border-radius: 8px;
            border-left: 6px solid var(--accent-color);
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 1.15em;
        }
        .result-value {
            font-weight: bold;
            color: #d35400;
        }
        .footer-info {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 0.95em;
            color: #555;
            line-height: 1.8;
        }
        .footer-item {
            display: block;
        }
        @media (max-width: 600px) {
            .grid-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>漿料換算極片數量計算機 (R8)</h1>
    
    <div class="grid-container">
        <div class="input-group">
            <label>單桶漿料重量 (kg)</label>
            <input type="number" id="weightPerBucket" value="11" step="0.1" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>投入桶數</label>
            <input type="number" id="bucketCount" value="2" step="1" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>過濾器/管路料損 (kg)</label>
            <input type="number" id="filterLoss" class="highlight" value="1.6" step="0.1" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>固含量 (%)</label>
            <input type="number" id="solidContent" value="57.10" step="0.01" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>面密度 (mg/cm²)</label>
            <input type="number" id="arealDensity" value="12.70" step="0.01" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>塗佈有效幅寬 (mm)</label>
            <input type="number" id="coatingWidth" value="255" step="1" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>單片極片高度 (mm)</label>
            <input type="number" id="pieceHeight" value="124" step="1" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>橫向模數 (2-up)</label>
            <input type="number" id="upCount" value="2" step="1" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>其他製程損耗率 (%)</label>
            <input type="number" id="lossRate" value="3" step="0.1" oninput="calculate()">
        </div>
    </div>

    <div class="result-section">
        <div class="result-item">
            <span>有效漿料量 (扣除過濾器損耗)：</span>
            <span class="result-value" id="effectiveSlurryOut">-</span>
        </div>
        <div class="result-item">
            <span>總乾料重量：</span>
            <span class="result-value" id="dryWeightOut">-</span>
        </div>
        <div class="result-item">
            <span>預估極捲總長度 (理論)：</span>
            <span class="result-value" id="lengthMOut">-</span>
        </div>
        <div class="result-item">
            <span>考慮 3% 損耗後有效長度：</span>
            <span class="result-value" id="actualLengthMOut">-</span>
        </div>
        <div class="result-item" style="border-top: 1px solid #ccc; padding-top: 10px; margin-top: 10px;">
            <span>實際可產出極片總量：</span>
            <span class="result-value" style="font-size: 1.4em;" id="totalPiecesOut">-</span>
        </div>
    </div>

    <div class="footer-info">
        <span class="footer-item">拜訪次數：20 次</span>
        <span class="footer-item">作者：SJ</span>
        <span class="footer-item">版本：v1.5.1</span>
        <span class="footer-item">最後更新日期：2026-03-16</span>
    </div>
</div>

<script>
function calculate() {
    // 讀取參數
    const wPerB = parseFloat(document.getElementById('weightPerBucket').value) || 0;
    const bCount = parseFloat(document.getElementById('bucketCount').value) || 0;
    const fLoss = parseFloat(document.getElementById('filterLoss').value) || 0;
    const sc = parseFloat(document.getElementById('solidContent').value) || 0;
    const ad = parseFloat(document.getElementById('arealDensity').value) || 0;
    const cw = parseFloat(document.getElementById('coatingWidth').value) || 0;
    const ph = parseFloat(document.getElementById('pieceHeight').value) || 0;
    const up = parseFloat(document.getElementById('upCount').value) || 0;
    const loss = parseFloat(document.getElementById('lossRate').value) || 0;

    // 1. 計算有效漿料量 (kg)
    let totalSlurryKg = (wPerB * bCount) - fLoss;
    if (totalSlurryKg < 0) totalSlurryKg = 0;
    
    // 2. 計算總乾料 (kg)
    let totalSlurryG = totalSlurryKg * 1000;
    let dryWeightG = totalSlurryG * (sc / 100);

    // 3. 計算長度 (m)
    let areaCm2 = dryWeightG / (ad / 1000);
    let lengthCm = areaCm2 / ((cw / 10) * 2);
    let lengthM = lengthCm / 100;
    
    // 考慮額外損耗
    let actualLengthM = lengthM * (1 - (loss / 100));

    // 4. 計算片數
    let rows = Math.floor((actualLengthM * 1000) / ph);
    let totalPieces = rows * up;

    // 更新介面顯示
    document.getElementById('effectiveSlurryOut').innerText = totalSlurryKg.toFixed(2) + " kg";
    document.getElementById('dryWeightOut').innerText = (dryWeightG / 1000).toFixed(3) + " kg";
    document.getElementById('lengthMOut').innerText = lengthM.toFixed(2) + " m";
    document.getElementById('actualLengthMOut').innerText = actualLengthM.toFixed(2) + " m";
    document.getElementById('totalPiecesOut').innerText = totalPieces.toLocaleString() + " 片";
}

window.onload = calculate;
</script>

</body>
</html>
